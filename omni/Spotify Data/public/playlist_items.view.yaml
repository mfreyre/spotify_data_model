# Reference this view as playlist_items
schema: public

dimensions:
  track_name: {}
  artist_name: {}
  album_name: {}

  track_uri:
    hidden: true

  item_type:
    description: Type of playlist item
    sample_values: [ track, episode ]

  added_date:
    description: Date the item was added to the playlist

  created_at:
    description: Record creation timestamp
    hidden: true

  id:
    format: ID
    hidden: true
    primary_key: true

  playlist_id:
    format: ID
    hidden: true

measures:
  count:
    label: Track Count
    aggregate_type: count
