# Reference this view as playlists
schema: public

dimensions:
  name:
    label: Playlist Name

  last_modified_date:
    description: Date the playlist was last modified

  created_at:
    description: Date the playlist was created

  id:
    format: ID
    hidden: true
    primary_key: true

measures:
  count:
    label: Playlist Count
    aggregate_type: count
