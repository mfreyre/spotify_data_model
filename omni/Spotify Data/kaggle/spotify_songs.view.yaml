# Reference this view as kaggle__spotify_songs
schema: kaggle
table_name: spotify_songs

dimensions:
  artist_name: {}
  song_name: {}
  language: {}
  album_name: {}
  release_year: {}

  lyrics:
    hidden: true

  genres:
    label: Genres (All)
    description: All genres associated with the song as a list

  artist_popularity:
    description: Spotify artist popularity score (0–100)

  acousticness:
    description: Confidence measure of whether the track is acoustic (0–1)

  danceability:
    description: How suitable the track is for dancing (0–1)

  energy:
    description: Perceptual measure of intensity and activity (0–1)

  instrumentalness:
    description: Predicts whether a track has no vocals (0–1; values above 0.5 are
      likely instrumental)

  key:
    description: Musical key of the track using Pitch Class notation (0=C, 1=C#,
      2=D, ... 11=B)

  liveness:
    description: Detects presence of a live audience (0–1; above 0.8 suggests live
      recording)

  loudness:
    description: Overall loudness in decibels (dB), typically −60 to 0

  mode:
    description: "Musical mode: 1 = major, 0 = minor"

  speechiness:
    description: Presence of spoken words (0–1; above 0.66 = likely spoken word,
      0.33–0.66 = mixed)

  tempo:
    description: Estimated tempo in beats per minute (BPM)

  time_signature:
    description: Estimated time signature (beats per bar, e.g. 3, 4)

  valence:
    label: Valence (Positivity)
    description: Musical positiveness (0–1; high = happy/euphoric, low = sad/angry)

  duration_ms:
    description: Track duration in milliseconds

  created_at:
    hidden: true

  genre:
    label: Genre (Primary)
    description: Primary genre of the song — prefer this over genres for grouping
      and filtering

  explicit:
    description: Whether the track has explicit lyrics (true/false)

  popularity:
    description: Spotify track popularity score (0–100)

  id:
    format: ID
    hidden: true
    primary_key: true

  track_id:
    format: ID
    hidden: true

measures:
  count:
    label: Number of Songs
    aggregate_type: count

  count_distinct_artists:
    sql: ${kaggle__spotify_songs.artist_name}
    label: Number of Artists
    aggregate_type: count_distinct

  count_distinct_albums:
    sql: ${kaggle__spotify_songs.album_name}
    label: Number of Albums
    aggregate_type: count_distinct

  avg_popularity:
    sql: ${kaggle__spotify_songs.popularity}
    label: Average Popularity
    format: number_1
    aggregate_type: average

  max_popularity:
    sql: ${kaggle__spotify_songs.popularity}
    label: Max Popularity
    format: number_0
    aggregate_type: max

  avg_artist_popularity:
    sql: ${kaggle__spotify_songs.artist_popularity}
    label: Average Artist Popularity
    format: number_1
    aggregate_type: average

  avg_danceability:
    sql: ${kaggle__spotify_songs.danceability}
    label: Average Danceability
    format: number_2
    aggregate_type: average

  avg_energy:
    sql: ${kaggle__spotify_songs.energy}
    label: Average Energy
    format: number_2
    aggregate_type: average

  avg_valence:
    sql: ${kaggle__spotify_songs.valence}
    label: Average Valence (Positivity)
    format: number_2
    aggregate_type: average

  avg_acousticness:
    sql: ${kaggle__spotify_songs.acousticness}
    label: Average Acousticness
    format: number_2
    aggregate_type: average

  avg_instrumentalness:
    sql: ${kaggle__spotify_songs.instrumentalness}
    label: Average Instrumentalness
    format: number_2
    aggregate_type: average

  avg_speechiness:
    sql: ${kaggle__spotify_songs.speechiness}
    label: Average Speechiness
    format: number_2
    aggregate_type: average

  avg_liveness:
    sql: ${kaggle__spotify_songs.liveness}
    label: Average Liveness
    format: number_2
    aggregate_type: average

  avg_loudness:
    sql: ${kaggle__spotify_songs.loudness}
    label: Average Loudness (dB)
    format: number_1
    aggregate_type: average

  avg_tempo:
    sql: ${kaggle__spotify_songs.tempo}
    label: Average Tempo (BPM)
    format: number_1
    aggregate_type: average

  avg_duration_ms:
    sql: ${kaggle__spotify_songs.duration_ms}
    label: Average Duration (ms)
    format: number_0
    aggregate_type: average

  count_explicit:
    label: Explicit Songs
    aggregate_type: count
    filters:
      explicit:
        is: true
