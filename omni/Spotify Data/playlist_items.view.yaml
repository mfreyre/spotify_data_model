# Reference this view as playlist_items
dimensions:
  track_uri:
    hidden: true

  item_type:
    description: Type of playlist item
    sample_values: [ track, episode ]

  added_date:
    description: Date the item was added to the playlist

  created_at:
    description: Record creation timestamp
    hidden: true

  id:
    hidden: true

  playlist_id:
    hidden: true

measures:
  count:
    label: Track Count
    aggregate_type: count
